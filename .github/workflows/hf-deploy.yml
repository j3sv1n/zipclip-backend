name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'Components/**'
      - '.github/workflows/hf-deploy.yml'
      - 'README.md'
      - 'API.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ github.repository_owner }}
          HF_SPACE_NAME: zipclip-backend
        run: |
          # Clean up existing git metadata to wipe bulky history
          rm -rf .git
          
          # Re-initialize as a tiny repo
          git init
          
          # Setup LFS for Hugging Face
          git lfs install
          git lfs track "*.mp4"
          git lfs track "*.mp3"
          git lfs track "*.caffemodel"
          git lfs track "*.prototxt"
          
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          git config user.name "GitHub Action"
          git config user.email "actions@github.com"
          
          # Add current files (obeying .gitignore)
          git add .
          git add .gitattributes
          git commit -m "deploy: update backend code with LFS assets"
          
          # Force push to the 'main' branch of the Space
          git push hf master:main -f
